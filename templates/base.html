{% load static django_htmx %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Map-It{% endblock title %}</title>
    
    <script src="{% static 'js/color-modes.js' %}"></script>

    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/bootstrap-icons.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/sweetalert2.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/leaflet.css' %}">
    <script src="{% static 'js/leaflet.js' %}"></script>

    <link rel="stylesheet" href="{% static 'css/MarkerCluster.Default.css' %}">
    <script src="{% static 'js/leaflet.markercluster.js' %}"></script>

    <script src="{% static 'js/purify.min.js' %}"></script>
    <script src="{% static 'js/vue.global.js' %}"></script>

    <script src="{% static 'js/sweetalert2.all.min.js' %}"></script>
    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
    <!-- <meta name="theme-color" content="#712cf9" /> -->
    <link rel="shortcut icon" type="image/png" href="{% static 'images/django-icon-256.png' %}" >
    <style>
      ins {
          background-color: transparent !important;
          color: inherit !important;
      }
    </style>
    {% block styles %}{% endblock styles %}
    {% htmx_script %}
</head>
<body hx-headers='{"x-csrftoken": "{{ csrf_token }}"}' class="min-vh-100 d-flex flex-shrink-0 flex-column">
  {% include 'header.html' %}
      
  {% block body %}
    {% block content %}
    {% endblock content %}
  {% endblock body %}

  <div id="toast-container" class="toast-container position-fixed bottom-0 start-0 p-3"></div>
      
  {% if messages %}
  <script id="django-messages" type="application/json">
  [
      {% for message in messages %}
      {
          "level": "{{ message.tags }}",
          "text": "{{ message|escapejs }}",
          "extra_tags": "{{ message.extra_tags|escapejs }}"
      }{% if not forloop.last %},{% endif %}
      {% endfor %}
  ]
  </script>
  {% endif %}

  <script nonce="{{ csp_nonce }}" src="{% static 'js/notifications.js' %}"></script>
  
</body>
</html>
